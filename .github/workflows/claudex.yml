name: Claudex

on:
  pull_request:
    paths:
      - "cmd/claudex/**"
      - "internal/claudex/**"
      - "claudex.example.yaml"
      - "claudex.ps1"
      - "claudex.cmd"
      - "Dockerfile"
      - "README.md"
      - "README.ja.md"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/claudex.yml"
  push:
    branches:
      - main
    paths:
      - "cmd/claudex/**"
      - "internal/claudex/**"
      - "claudex.example.yaml"
      - "claudex.ps1"
      - "claudex.cmd"
      - "Dockerfile"
      - "README.md"
      - "README.ja.md"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/claudex.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Check formatting
        run: test -z "$(gofmt -l cmd/claudex internal/claudex)"
      - name: Test focused packages
        run: |
          set -o pipefail
          go test ./internal/claudex ./cmd/claudex 2>&1 | tee claudex-test.log
      - name: Upload test failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: claudex-test-log
          path: claudex-test.log
          if-no-files-found: ignore
      - name: Build Claudex
        run: go build ./cmd/claudex
